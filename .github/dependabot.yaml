version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: nix
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "flake"
    groups:
      inputs:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "cargo"
    groups:
      cargo:
        patterns:
          - "*"
